<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thank You | Trusted Hands Pet Care</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f7f9;
  --ink:#0f172a;
  --muted:#475569;
  --line:rgba(15,23,42,.10);
  --shadow:0 18px 48px rgba(15,23,42,.08);
  --accent:#1f7a6b;
  --radius:18px;
}
body{
  margin:0;
  height:100vh;
  display:grid;
  place-items:center;
  font-family:Inter, system-ui, sans-serif;
  background:var(--bg);
  color:var(--ink);
}
.card{
  width:min(720px, calc(100% - 40px));
  background:#fff;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
  padding:28px;
  text-align:center;
}
h1{margin:0 0 8px; font-size:32px; letter-spacing:-.7px}
p{margin:0 0 14px; color:var(--muted)}
a{
  display:inline-block;
  padding:12px 14px;
  border-radius:12px;
  background:rgba(31,122,107,.12);
  color:#115e59;
  font-weight:900;
  text-decoration:none;
  border:1px solid rgba(31,122,107,.18);
}
</style>
</head>
<body>
  <div class="card">
    <h1>Thank you.</h1>
    <p>Your booking request has been received. We’ll follow up to confirm availability and schedule your meet &amp; greet.</p>
    <a href="/">Return to Home</a>
  </div>
</body>
</html>
